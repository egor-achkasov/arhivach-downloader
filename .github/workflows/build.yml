name: Build Windows Executables

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build --release --bin arhivach-downloader-cli

      - name: Build TUI
        run: cargo build --release --bin arhivach-downloader-tui

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: arhivach-downloader-cli
          path: target/release/arhivach-downloader-cli.exe

      - name: Upload TUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: arhivach-downloader-tui
          path: target/release/arhivach-downloader-tui.exe
