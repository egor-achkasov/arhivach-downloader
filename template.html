<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{thread_title}} - Thread Archive</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.5;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
      background: #f5f5f5;
      color: #333;
    }
    .thread-title {
      font-size: 1.5rem;
      margin: 0 0 1rem 0;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #ccc;
    }
    .post {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 0.75rem;
      padding: 0.75rem;
    }
    .post-head {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.5rem;
    }
    .post-subject {
      font-weight: bold;
      color: #c41;
      margin-right: 0.5rem;
    }
    .post-name {
      font-weight: bold;
      color: #117743;
    }
    .post-time {
      margin-left: 0.5rem;
    }
    .post-num {
      margin-left: 0.5rem;
      color: #999;
    }
    .post-id a {
      margin-left: 0.5rem;
      color: #c41;
      text-decoration: none;
    }
    .post-id a:hover { text-decoration: underline; }
    .post-images {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .post-image {
      max-width: 200px;
    }
    .post-image > a {
      display: block;
    }
    .post-image img {
      max-width: 100%;
      max-height: 200px;
      border: 1px solid #ccc;
      border-radius: 2px;
    }
    .post-image img:hover {
      border-color: #c41;
    }
    .post-image-info {
      font-size: 0.75rem;
      margin-top: 0.25rem;
      color: #555;
      word-break: break-all;
    }
    .post-image-link {
      color: #c41;
      text-decoration: none;
    }
    .post-image-link:hover { text-decoration: underline; }
    .post-body {
      word-wrap: break-word;
    }
    .post-body a {
      color: #c41;
      text-decoration: none;
    }
    .post-body a:hover { text-decoration: underline; }
    .quote { color: #789922; }
    .reply-link { color: #c41; }
    .sage { color: #a00; font-style: italic; }
  </style>
</head>
<body>

{{posts}}

</body>
</html>
